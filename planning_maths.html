<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planning Maths — Brevet 2026 — Zachou</title>
<style>
:root{
  --orange:#D35400;--orange-light:#FDEBD0;
  --vert:#1E8449;--vert-light:#D5F5E3;
  --rouge:#C0392B;--rouge-light:#FADBD8;
  --bleu:#1A5276;--bleu-light:#D6EAF8;
  --gris:#5D6D7E;--gris-light:#EAF2FF;
  --bg:#F8F9FA;--card:#FFFFFF;--text:#2C3E50;--muted:#7F8C8D;
  --border:#DEE2E6;--radius:10px;
}
*{-webkit-box-sizing:border-box;box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);font-size:15px;-webkit-font-smoothing:antialiased;padding-bottom:60px;-webkit-tap-highlight-color:transparent}

.hero{background:var(--orange);color:white;padding:24px 20px;text-align:center}
.hero h1{font-size:20px;font-weight:700;margin-bottom:6px}
.hero h1 span{color:#FFD700}
.hero-sub{font-size:13px;opacity:.9;margin-bottom:14px}
.exam-pill{display:inline-block;background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.4);border-radius:20px;padding:6px 18px;font-size:13px;color:white;font-weight:700}
.exam-pill b{color:#FFD700}

.container{max-width:740px;margin:0 auto;padding:20px 14px}

/* Barre de progression */
.progress-bar-wrap{background:white;border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:20px}
.progress-label{display:-webkit-flex;display:flex;-webkit-justify-content:space-between;justify-content:space-between;-webkit-align-items:center;align-items:center;margin-bottom:10px}
.progress-title{font-size:13px;font-weight:700;color:var(--text)}
.progress-count{font-size:13px;font-weight:700;color:var(--orange)}
.progress-track{background:var(--gris-light);border-radius:10px;height:14px;overflow:hidden}
.progress-fill{background:var(--orange);height:14px;border-radius:10px;-webkit-transition:width 0.3s;transition:width 0.3s}
.progress-legend{display:-webkit-flex;display:flex;gap:16px;margin-top:10px;-webkit-flex-wrap:wrap;flex-wrap:wrap}
.leg{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
.leg-dot{width:10px;height:10px;border-radius:50%}
.leg-done{background:var(--vert)}
.leg-todo{background:var(--gris-light);border:1px solid var(--border)}

/* Filtres */
.filters{display:-webkit-flex;display:flex;gap:8px;-webkit-flex-wrap:wrap;flex-wrap:wrap;margin-bottom:20px}
.fb{background:white;border:2px solid var(--border);border-radius:20px;padding:6px 16px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer}
.fb.active{background:var(--orange);border-color:var(--orange);color:white}

/* Section thème */
.theme-head{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:12px;margin:24px 0 10px}
.theme-badge{font-size:11px;font-weight:700;letter-spacing:1px;padding:4px 14px;border-radius:20px;background:var(--orange);color:white;white-space:nowrap}
.theme-line{-webkit-flex:1;flex:1;height:1px;background:var(--border)}

/* Cartes séquence */
.seq-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;display:-webkit-flex;display:flex;-webkit-align-items:flex-start;align-items:flex-start;gap:12px;cursor:pointer;-webkit-transition:border-color 0.15s;transition:border-color 0.15s}
.seq-card:hover{border-color:var(--orange)}
.seq-card.done{background:#FAFFF8;border-color:var(--vert)}

.check-box{width:22px;height:22px;border-radius:5px;border:2px solid var(--border);-webkit-flex-shrink:0;flex-shrink:0;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;margin-top:1px;-webkit-transition:background 0.15s,border-color 0.15s;transition:background 0.15s,border-color 0.15s}
.seq-card.done .check-box{background:var(--vert);border-color:var(--vert);color:white;font-size:13px}

.seq-info{-webkit-flex:1;flex:1}
.seq-code{font-size:11px;font-weight:700;color:var(--orange);margin-bottom:3px}
.seq-card.done .seq-code{color:var(--vert)}
.seq-title{font-size:13px;font-weight:600;color:var(--text);line-height:1.4}
.seq-date{font-size:11px;color:var(--muted);margin-top:4px}
.seq-card.done .seq-title{color:var(--gris)}
.seq-card.done .seq-date{color:var(--vert)}

.tag-fait{display:inline-block;background:var(--vert-light);color:var(--vert);border:1px solid var(--vert);font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-top:6px}
.tag-todo{display:inline-block;background:var(--orange-light);color:var(--orange);border:1px solid var(--orange);font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-top:6px}
.tag-annales{display:inline-block;background:#c0392b;color:white;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-top:6px}

/* Bouton reset */
.btn-reset{display:block;margin:28px auto 0;background:white;border:2px solid var(--border);border-radius:20px;padding:8px 24px;font-size:12px;color:var(--muted);cursor:pointer;font-family:inherit}
.btn-reset:hover{border-color:var(--rouge);color:var(--rouge)}

/* Exam countdown */
.exam-box{background:white;border:2px solid var(--orange);border-radius:var(--radius);padding:14px 18px;margin-bottom:20px;text-align:center}
.exam-box-title{font-size:12px;color:var(--muted);margin-bottom:4px}
.exam-box-days{font-size:28px;font-weight:700;color:var(--orange)}
.exam-box-sub{font-size:12px;color:var(--muted)}
</style>
</head>
<body>

<div class="hero">
  <h1>📐 Planning Maths — <span>Zachou</span> 💪</h1>
  <div class="hero-sub">39 jours d'exercices type Brevet · + Annales</div>
  <div class="exam-pill">Examen : <b>29 juin 2026</b></div>
</div>

<div class="container">

  <div class="exam-box">
    <div class="exam-box-title">Compte à rebours</div>
    <div class="exam-box-days" id="jours-restants">—</div>
    <div class="exam-box-sub">jours avant l'examen de maths (29 juin)</div>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-label">
      <span class="progress-title">Progression globale</span>
      <span class="progress-count" id="prog-count">0 / 40</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="prog-fill" style="width:0%"></div>
    </div>
    <div class="progress-legend">
      <span class="leg"><span class="leg-dot leg-done"></span>Jour fait</span>
      <span class="leg"><span class="leg-dot leg-todo"></span>Jour à faire</span>
    </div>
  </div>

  <div class="filters">
    <div class="fb active" onclick="filtrer('tous')">Tout voir</div>
    <div class="fb" onclick="filtrer('nombres')">Nombres</div>
    <div class="fb" onclick="filtrer('algebre')">Algèbre</div>
    <div class="fb" onclick="filtrer('geometrie')">Géométrie</div>
    <div class="fb" onclick="filtrer('stats')">Stats &amp; Probas</div>
    <div class="fb" onclick="filtrer('fonctions')">Fonctions</div>
    <div class="fb" onclick="filtrer('annales')">Annales</div>
    <div class="fb" onclick="filtrer('non-coches')">Non cochés</div>
  </div>

  <div id="planning-container"></div>

  <button class="btn-reset" onclick="resetTout()">🔄 Tout remettre à zéro</button>

</div>

<script>

var SEQS = [
  {id:'M01', theme:'stats', label:'Stats & Probas', titre:'Probabilités + Calcul littéral', date:'21 mai (Jour 1)', fait:true},
  {id:'M02', theme:'geometrie', label:'Géométrie', titre:'Pythagore + Thalès', date:'22 mai (Jour 2)', fait:true},
  {id:'M03', theme:'nombres', label:'Nombres', titre:'Statistiques + Arithmétique (PGCD)', date:'23 mai (Jour 3)', fait:true},
  {id:'M04', theme:'fonctions', label:'Fonctions', titre:'Fonctions + Trigonométrie', date:'24 mai (Jour 4)', fait:true},
  {id:'M05', theme:'nombres', label:'Nombres', titre:'Volumes + Pourcentages', date:'25 mai (Jour 5)', fait:true},
  {id:'M06', theme:'algebre', label:'Algèbre', titre:'Calcul littéral et équations', date:'26 mai (Jour 6)', fait:true},
  {id:'M07', theme:'stats', label:'Stats & Probas', titre:'QCM + Médiane', date:'27 mai (Jour 7)', fait:true},
  {id:'M08', theme:'geometrie', label:'Géométrie', titre:'Thalès + Triangles semblables', date:'28 mai (Jour 8)', fait:true},
  {id:'M09', theme:'nombres', label:'Nombres', titre:'Ratio, proportionnalité et PGCD', date:'29 mai (Jour 9)', fait:true},
  {id:'M10', theme:'stats', label:'Stats & Probas', titre:'Statistiques : étendue, moyenne, médiane', date:'30 mai (Jour 10)', fait:true},
  {id:'M11', theme:'geometrie', label:'Géométrie', titre:'Pythagore, angles, arcs de cercle', date:'31 mai (Jour 11)', fait:true},
  {id:'M12', theme:'stats', label:'Stats & Probas', titre:'Probabilités : tableau double entrée', date:'1 juin (Jour 12)', fait:true},
  {id:'M13', theme:'algebre', label:'Algèbre', titre:'Factorisation et programmes de calcul', date:'2 juin (Jour 13)', fait:true},
  {id:'M14', theme:'fonctions', label:'Fonctions', titre:'Fonctions affines : interprétation', date:'3 juin (Jour 14)', fait:true},
  {id:'M15', theme:'geometrie', label:'Géométrie', titre:'Thalès : étagère et plafond', date:'4 juin (Jour 15)', fait:true},
  {id:'M16', theme:'nombres', label:'Nombres', titre:'Pourcentages, réductions et nombres premiers', date:'5 juin (Jour 16)', fait:true},
  {id:'M17', theme:'geometrie', label:'Géométrie', titre:'Volumes et énergie', date:'6 juin (Jour 17)', fait:true},
  {id:'M18', theme:'algebre', label:'Algèbre', titre:'Équations du second degré et factorisation', date:'7 juin (Jour 18)', fait:true},
  {id:'M19', theme:'stats', label:'Stats & Probas', titre:'Statistiques complètes : étendue, moyenne, médiane', date:'8 juin (Jour 19)', fait:true},
  {id:'M20', theme:'algebre', label:'Algèbre', titre:'Révision générale : tous thèmes', date:'9 juin (Jour 20)', fait:true},
  {id:'M21', theme:'nombres', label:'Nombres', titre:'Vitesse, écriture scientifique, fractions', date:'10 juin (Jour 21)', fait:true},
  {id:'M22', theme:'nombres', label:'Nombres', titre:'PPCM : circuits d\'entraînement', date:'11 juin (Jour 22)', fait:true},
  {id:'M23', theme:'algebre', label:'Algèbre', titre:'Programme de calcul + équation-produit', date:'12 juin (Jour 23)', fait:true},
  {id:'M24', theme:'geometrie', label:'Géométrie', titre:'Thalès, Pythagore, homothétie', date:'13 juin (Jour 24)', fait:true},
  {id:'M25', theme:'geometrie', label:'Géométrie', titre:'Cône : volume et patron', date:'14 juin (Jour 25)', fait:true},
  {id:'M26', theme:'geometrie', label:'Géométrie', titre:'Panneaux solaires : Pythagore et trigo', date:'15 juin (Jour 26)', fait:true},
  {id:'M27', theme:'geometrie', label:'Géométrie', titre:'Thalès et coût de matériaux', date:'16 juin (Jour 27)', fait:true},
  {id:'M28', theme:'stats', label:'Stats & Probas', titre:'Probabilités : boules et dé', date:'17 juin (Jour 28)', fait:true},
  {id:'M29', theme:'geometrie', label:'Géométrie', titre:'Piste de karting : périmètre et PPCM', date:'18 juin (Jour 29)', fait:true},
  {id:'M30', theme:'algebre', label:'Algèbre', titre:'Suites géométriques : carrés', date:'19 juin (Jour 30)', fait:true},
  {id:'M31', theme:'stats', label:'Stats & Probas', titre:'Statistiques complètes : marché', date:'20 juin (Jour 31)', fait:true},
  {id:'M32', theme:'fonctions', label:'Fonctions', titre:'QCM : fonctions et identités remarquables', date:'21 juin (Jour 32)', fait:true},
  {id:'M33', theme:'algebre', label:'Algèbre', titre:'Programme de calcul : factorisation', date:'22 juin (Jour 33)', fait:true},
  {id:'M34', theme:'stats', label:'Stats & Probas', titre:'Probabilités : roue et fractions', date:'23 juin (Jour 34)', fait:true},
  {id:'M35', theme:'geometrie', label:'Géométrie', titre:'Pyramide : Pythagore et trigo', date:'24 juin (Jour 35)', fait:true},
  {id:'M36', theme:'algebre', label:'Algèbre', titre:'Système d\'équations et inéquations', date:'25 juin (Jour 36)', fait:true},
  {id:'M37', theme:'stats', label:'Stats & Probas', titre:'Probabilités et géométrie dans l\'espace', date:'26 juin (Jour 37)', fait:true},
  {id:'M38', theme:'algebre', label:'Algèbre', titre:'Sujet complet type brevet (partie 1)', date:'27 juin (Jour 38)', fait:true},
  {id:'M39', theme:'algebre', label:'Algèbre', titre:'Bilan final : veille du brevet', date:'28 juin (Jour 39)', fait:true},

  {id:'ANNALES', theme:'annales', label:'Annales', titre:'Annales officielles Brevet (2020–2024)', date:'Tout au long', fait:true, annales:true}
];

var filtreActif = 'tous';

function getEtat(id){
  try{
    var v = localStorage.getItem('math_' + id);
    return v === '1';
  }catch(e){return false;}
}

function setEtat(id, val){
  try{localStorage.setItem('math_' + id, val ? '1' : '0');}catch(e){}
}

function updateProgress(){
  var total = SEQS.length;
  var coches = 0;
  for(var i=0;i<SEQS.length;i++){
    if(getEtat(SEQS[i].id)) coches++;
  }
  var pct = Math.round((coches/total)*100);
  document.getElementById('prog-count').textContent = coches + ' / ' + total;
  document.getElementById('prog-fill').style.width = pct + '%';
}

function toggleSeq(id){
  var actuel = getEtat(id);
  setEtat(id, !actuel);
  render();
  updateProgress();
}

function filtrer(f){
  filtreActif = f;
  var btns = document.querySelectorAll('.fb');
  for(var i=0;i<btns.length;i++) btns[i].classList.remove('active');
  event.target.classList.add('active');
  render();
}

function resetTout(){
  if(window.confirm('Remettre toutes les cases à zéro ?')){
    for(var i=0;i<SEQS.length;i++){
      setEtat(SEQS[i].id, false);
    }
    render();
    updateProgress();
  }
}

function render(){
  var container = document.getElementById('planning-container');
  container.innerHTML = '';

  var filtered = [];
  for(var i=0;i<SEQS.length;i++){
    var s = SEQS[i];
    if(filtreActif === 'tous'){filtered.push(s); continue;}
    if(filtreActif === 'non-coches' && !getEtat(s.id)){filtered.push(s); continue;}
    if(filtreActif === s.theme){filtered.push(s); continue;}
  }

  if(filtered.length === 0){
    container.innerHTML = '<p style="text-align:center;color:var(--muted);padding:30px 0;font-size:13px">Aucune séquence dans ce filtre.</p>';
    return;
  }

  var themes = [];
  var themeMap = {};
  for(var i=0;i<filtered.length;i++){
    var s = filtered[i];
    if(!themeMap[s.label]){
      themeMap[s.label] = [];
      themes.push(s.label);
    }
    themeMap[s.label].push(s);
  }

  for(var t=0;t<themes.length;t++){
    var label = themes[t];
    var seqs = themeMap[label];

    var head = document.createElement('div');
    head.className = 'theme-head';
    head.innerHTML = '<span class="theme-badge">' + label.toUpperCase() + '</span><div class="theme-line"></div>';
    container.appendChild(head);

    for(var j=0;j<seqs.length;j++){
      (function(seq){
        var done = getEtat(seq.id);
        var card = document.createElement('div');
        card.className = 'seq-card' + (done ? ' done' : '');
        card.onclick = function(){ toggleSeq(seq.id); };

        var checkContent = done ? '✓' : '';
        var tagHtml = '';
        if(seq.annales){
          tagHtml = '<div class="tag-annales">📄 Annales PDF</div>';
        } else if(done){
          tagHtml = '<div class="tag-fait">✓ Fait</div>';
        } else {
          tagHtml = '<div class="tag-todo">À faire</div>';
        }

        card.innerHTML =
          '<div class="check-box">' + checkContent + '</div>' +
          '<div class="seq-info">' +
            '<div class="seq-code">' + seq.id + '</div>' +
            '<div class="seq-title">' + seq.titre + '</div>' +
            '<div class="seq-date">📅 ' + seq.date + '</div>' +
            tagHtml +
          '</div>';

        container.appendChild(card);
      })(seqs[j]);
    }
  }
}

function updateCountdown(){
  var exam = new Date('2026-06-29T08:00:00');
  var now = new Date();
  var diff = Math.ceil((exam - now) / (1000*60*60*24));
  var el = document.getElementById('jours-restants');
  if(diff > 0){
    el.textContent = diff;
  } else if(diff === 0){
    el.textContent = "Aujourd'hui !";
    el.style.color = 'var(--rouge)';
  } else {
    el.textContent = "C'est passé !";
    el.style.color = 'var(--muted)';
  }
}

function initEtats(){
  for(var i=0;i<SEQS.length;i++){
    var s = SEQS[i];
    try{
      if(localStorage.getItem('math_' + s.id) === null && s.fait){
        setEtat(s.id, true);
      }
    }catch(e){}
  }
}

initEtats();
updateCountdown();
render();
updateProgress();

</script>
</body>
</html>
