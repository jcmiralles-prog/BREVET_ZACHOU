<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Planning Brevet 2026 — Zach</title>
<style>
:root{
  --rouge:#C0392B;--rouge-clair:#FADBD8;
  --bleu:#1A5276;--bleu-clair:#D6EAF8;
  --vert:#1E8449;--vert-clair:#D5F5E3;
  --orange:#D35400;--orange-clair:#FDEBD0;
  --gris:#5D6D7E;--gris-clair:#EAF2FF;
  --fond:#F8F9FA;--blanc:#FFFFFF;
  --texte:#2C3E50;--attenue:#7F8C8D;
  --bord:#DEE2E6;
}
*{-webkit-box-sizing:border-box;box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:var(--fond);color:var(--texte);font-size:15px;-webkit-font-smoothing:antialiased}
.top-bar{background:var(--bleu);color:white;padding:16px 14px 12px}
.top-bar h1{font-size:16px;font-weight:700;margin-bottom:2px}
.top-bar p{font-size:11px;opacity:.88;margin-bottom:10px}
.pb-wrap{background:rgba(255,255,255,.25);border-radius:20px;height:8px}
.pb-fill{background:#2ECC71;border-radius:20px;height:8px;-webkit-transition:width .4s;transition:width .4s}
.pb-label{font-size:11px;opacity:.9;margin-top:4px}
.legende{display:-webkit-flex;display:flex;-webkit-flex-wrap:wrap;flex-wrap:wrap;gap:8px;padding:8px 14px;background:var(--blanc);border-bottom:1px solid var(--bord)}
.leg{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:5px;font-size:11px;color:var(--attenue)}
.leg-pt{width:9px;height:9px;border-radius:2px;-webkit-flex-shrink:0;flex-shrink:0}
.filtres{display:-webkit-flex;display:flex;gap:8px;-webkit-flex-wrap:wrap;flex-wrap:wrap;padding:10px 14px;background:var(--blanc);border-bottom:1px solid var(--bord)}
.fb{border:1.5px solid var(--bord);border-radius:20px;padding:6px 13px;font-size:12px;font-weight:600;cursor:pointer;background:var(--blanc);color:var(--attenue);-webkit-appearance:none;appearance:none}
.fb.aa{background:var(--texte);color:white;border-color:var(--texte)}
.fb.ah{background:var(--rouge-clair);color:var(--rouge);border-color:var(--rouge)}
.fb.ag{background:var(--bleu-clair);color:var(--bleu);border-color:var(--bleu)}
.fb.ae{background:var(--vert-clair);color:var(--vert);border-color:var(--vert)}
.fb.ar{background:var(--gris-clair);color:var(--gris);border-color:var(--gris)}
.stats{display:-webkit-flex;display:flex;gap:10px;padding:8px 14px;background:var(--blanc);border-bottom:1px solid var(--bord);-webkit-flex-wrap:wrap;flex-wrap:wrap;-webkit-align-items:center;align-items:center}
.stat{font-size:12px;color:var(--attenue)}
.stat b{color:var(--texte)}
.raz{font-size:11px;color:var(--rouge);border:none;background:none;cursor:pointer;margin-left:auto;text-decoration:underline;padding:4px 0;-webkit-appearance:none}
.main{padding:12px 14px;max-width:680px;margin:0 auto}
.wk-head{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:8px;margin:18px 0 8px;padding-bottom:6px;border-bottom:2px solid var(--bord)}
.wk-badge{background:var(--texte);color:white;border-radius:20px;padding:3px 12px;font-size:11px;font-weight:700;-webkit-flex-shrink:0;flex-shrink:0}
.seq{background:var(--blanc);border:1px solid var(--bord);border-radius:10px;margin-bottom:10px;overflow:hidden}
.seq-hd{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:8px;padding:12px 13px;cursor:pointer;-webkit-tap-highlight-color:rgba(0,0,0,.05);-webkit-user-select:none;user-select:none}
.mat{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;-webkit-flex-shrink:0;flex-shrink:0}
.bh{background:var(--rouge-clair);color:var(--rouge)}
.bg{background:var(--bleu-clair);color:var(--bleu)}
.be{background:var(--vert-clair);color:var(--vert)}
.br{background:var(--gris-clair);color:var(--gris)}
.seq-info{-webkit-flex:1;flex:1;min-width:0;overflow:hidden}
.seq-titre{font-size:13px;font-weight:600;color:var(--texte);line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.seq-dates{font-size:11px;color:var(--attenue);margin-top:2px}
.seq-nb{font-size:11px;font-weight:700;-webkit-flex-shrink:0;flex-shrink:0;margin-left:4px}
.seq-fl{font-size:12px;color:var(--attenue);margin-left:4px;-webkit-flex-shrink:0;flex-shrink:0;display:inline-block;-webkit-transition:-webkit-transform .2s;transition:transform .2s}
.seq-fl.ouvert{-webkit-transform:rotate(180deg);transform:rotate(180deg)}
.seq-bd{display:none;border-top:1px solid var(--bord)}
.seq-bd.ouvert{display:block}
.jour{display:-webkit-flex;display:flex;-webkit-align-items:flex-start;align-items:flex-start;gap:10px;padding:10px 13px;border-bottom:1px solid #F0F0F0;cursor:pointer;-webkit-tap-highlight-color:rgba(0,0,0,.05)}
.jour:last-child{border-bottom:none}
.jour.fait{background:#F0FFF4}
.case{width:22px;height:22px;min-width:22px;border:2px solid var(--bord);border-radius:5px;-webkit-flex-shrink:0;flex-shrink:0;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;margin-top:1px}
.jour.fait .case{background:var(--vert);border-color:var(--vert)}
.coche{color:white;font-size:13px;font-weight:700;display:none}
.jour.fait .coche{display:block}
.jour-info{-webkit-flex:1;flex:1;min-width:0}
.jour-date{font-size:11px;color:var(--attenue);font-weight:600;margin-bottom:2px}
.jour-tache{font-size:13px;color:var(--texte);line-height:1.4}
.jour.fait .jour-tache{text-decoration:line-through;color:var(--attenue)}
.tag{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap;-webkit-flex-shrink:0;flex-shrink:0;-webkit-align-self:flex-start;align-self:flex-start;margin-top:2px}
.tc{background:#D6EAF8;color:#1A5276}
.tq{background:#D5F5E3;color:#1E8449}
.tf{background:#FDEBD0;color:#D35400}
.te{background:#FADBD8;color:#C0392B}
.tv{background:#EAF2FF;color:#5D6D7E}
.vide{text-align:center;color:var(--attenue);padding:40px 20px;font-size:14px}
@media(max-width:380px){.seq-titre{font-size:12px}.jour-tache{font-size:12px}.filtres{gap:6px}.fb{padding:5px 10px;font-size:11px}}
</style>
</head>
<body>

<div class="top-bar">
  <h1>📚 Planning Brevet 2026 — Zach 💪</h1>
  <p>Brevet : 26, 29 et 30 juin 2026 · 30 min/jour · Tous les jours</p>
  <div class="pb-wrap"><div class="pb-fill" id="pb" style="width:0%"></div></div>
  <div class="pb-label" id="pb-label">Chargement…</div>
</div>

<div class="legende">
  <span class="leg"><span class="leg-pt" style="background:#C0392B"></span>Histoire</span>
  <span class="leg"><span class="leg-pt" style="background:#1A5276"></span>Géographie</span>
  <span class="leg"><span class="leg-pt" style="background:#1E8449"></span>Éducation Morale et Civique</span>
  <span class="leg"><span class="leg-pt" style="background:#5D6D7E"></span>Révision</span>
</div>

<div class="filtres">
  <button class="fb aa" id="fb-all" onclick="filtrer('all')">Tout</button>
  <button class="fb" id="fb-hist" onclick="filtrer('hist')">Histoire</button>
  <button class="fb" id="fb-geo" onclick="filtrer('geo')">Géographie</button>
  <button class="fb" id="fb-emc" onclick="filtrer('emc')">Éducation Morale et Civique</button>
  <button class="fb" id="fb-rev" onclick="filtrer('rev')">Révision</button>
</div>

<div class="stats">
  <span class="stat" id="st-tot">—</span>
  <span class="stat" id="st-fait">—</span>
  <span class="stat" id="st-rest">—</span>
  <button class="raz" onclick="razAll()">Tout remettre à zéro</button>
</div>

<div class="main" id="main"></div>

<script>
// ── DONNÉES ──────────────────────────────────────────────────────────────
var SEQS = [
  {id:'H1',mat:'hist',sem:'Semaine 1 · 17–23 mai',titre:'H1 — La Première Guerre Mondiale (1914–1918)',dates:'Sam 17 – Lun 19 mai',jours:[
    {id:'H1-1',d:'Sam 17 mai',t:'Cours : causes, déclenchement, guerre des tranchées',tag:'c'},

  ]},

    {id:'G1-2',d:'Mer 21 mai',t:'Quiz J-1 + Fiche : chiffres clés, exemples, inégalités',tag:'f'}
  ]},

    {id:'H2-1',d:'Jeu 22 mai',t:'Cours : montée du nazisme en Allemagne et du fascisme en Italie',tag:'c'},
    {id:'H2-2',d:'Ven 23 mai',t:'Quiz J-1 + Cours : stalinisme en URSS + Fiche',tag:'f'}
  ]},
  {id:'H2b',mat:'hist',sem:'Semaine 2 · 24–30 mai',titre:'H2 — Exercice brevet totalitarismes',dates:'Sam 24 mai',jours:[
    {id:'H2-3',d:'Sam 24 mai',t:'Exercice brevet : analyse de documents sur les totalitarismes',tag:'e'}
  ]},
  {id:'G2',mat:'geo',sem:'Semaine 2 · 24–30 mai',titre:'G2 — Les espaces productifs et leurs évolutions',dates:'Dim 25 – Lun 26 mai',jours:[
    {id:'G2-1',d:'Dim 25 mai',t:'Cours : espaces industriels, agricoles, tertiaires et leurs mutations',tag:'c'},
    {id:'G2-2',d:'Lun 26 mai',t:'Quiz J-1 + Fiche + Exercice brevet : analyse d\'un espace productif',tag:'e'}
  ]},
  {id:'H3',mat:'hist',sem:'Semaine 2 · 24–30 mai',titre:'H3 — La Seconde Guerre Mondiale (1939–1945)',dates:'Mar 27 – Ven 30 mai',jours:[
    {id:'H3-1',d:'Mar 27 mai',t:'Cours : déroulement, guerre totale, Shoah et génocides',tag:'c'},
    {id:'H3-2',d:'Mer 28 mai',t:'Quiz J-1 + Cours : crimes de guerre, bilan humain',tag:'q'},
    {id:'H3-3',d:'Jeu 29 mai',t:'Fiche : dates clés, lieux, personnages',tag:'f'},
    {id:'H3-4',d:'Ven 30 mai',t:'Exercice brevet : paragraphe argumenté sur la Shoah',tag:'e'}
  ]},
  {id:'G3',mat:'geo',sem:'Semaine 3 · 31 mai – 6 juin',titre:'G3 — Les espaces peu peuplés et leurs atouts',dates:'Sam 31 mai',jours:[
    {id:'G3-1',d:'Sam 31 mai',t:'Cours + Fiche : espaces ruraux, montagnes, tourisme, nouvelles attractivités',tag:'f'}
  ]},
  {id:'H4',mat:'hist',sem:'Semaine 3 · 31 mai – 6 juin',titre:'H4 — La France sous l\'Occupation (1940–1944)',dates:'Dim 1 – Mar 3 juin',jours:[
    {id:'H4-1',d:'Dim 1 juin',t:'Cours : Occupation, régime de Vichy, collaboration',tag:'c'},
    {id:'H4-2',d:'Lun 2 juin',t:'Quiz J-1 + Cours : Résistance intérieure et France Libre',tag:'q'},
    {id:'H4-3',d:'Mar 3 juin',t:'Fiche + Exercice brevet : analyse document sur Vichy',tag:'e'}
  ]},
  {id:'G4',mat:'geo',sem:'Semaine 3 · 31 mai – 6 juin',titre:'G4 — L\'aménagement du territoire',dates:'Mer 4 – Jeu 5 juin',jours:[
    {id:'G4-1',d:'Mer 4 juin',t:'Cours : réduire les inégalités territoriales, politiques publiques',tag:'c'},
    {id:'G4-2',d:'Jeu 5 juin',t:'Quiz J-1 + Fiche : exemples, chiffres, enjeux',tag:'f'}
  ]},
  {id:'H5',mat:'hist',sem:'Semaine 3 · 31 mai – 6 juin',titre:'H5 — La décolonisation après 1945',dates:'Ven 6 – Sam 7 juin',jours:[
    {id:'H5-1',d:'Ven 6 juin',t:'Cours : causes, processus, indépendances (Inde, Algérie)',tag:'c'},
    {id:'H5-2',d:'Sam 7 juin',t:'Quiz J-1 + Fiche : dates, pays, personnages clés',tag:'f'}
  ]},
  {id:'H5b',mat:'hist',sem:'Semaine 4 · 8–13 juin',titre:'H5 — Exercice brevet décolonisation',dates:'Dim 8 juin',jours:[
    {id:'H5-3',d:'Dim 8 juin',t:'Exercice brevet : expliquer l\'indépendance d\'une colonie',tag:'e'}
  ]},
  {id:'G5',mat:'geo',sem:'Semaine 4 · 8–13 juin',titre:'G5 — Les territoires ultramarins français',dates:'Lun 9 juin',jours:[
    {id:'G5-1',d:'Lun 9 juin',t:'Cours + Fiche : localisation, enjeux, richesses, défis',tag:'f'}
  ]},
  {id:'H6',mat:'hist',sem:'Semaine 4 · 8–13 juin',titre:'H6 — La Guerre Froide (1947–1991)',dates:'Mar 10 – Jeu 12 juin',jours:[
    {id:'H6-1',d:'Mar 10 juin',t:'Cours : les deux blocs, crises de Berlin et de Cuba',tag:'c'},
    {id:'H6-2',d:'Mer 11 juin',t:'Quiz J-1 + Cours : détente, chute du mur de Berlin (9 nov. 1989)',tag:'q'},
    {id:'H6-3',d:'Jeu 12 juin',t:'Fiche + Exercice brevet : analyse document Guerre Froide',tag:'e'}
  ]},
  {id:'G6',mat:'geo',sem:'Semaine 4 · 8–13 juin',titre:'G6 — La France et l\'Union Européenne dans le monde',dates:'Ven 13 – Sam 14 juin',jours:[
    {id:'G6-1',d:'Ven 13 juin',t:'Cours : place de la France et de l\'Europe dans la mondialisation',tag:'c'},
    {id:'G6-2',d:'Sam 14 juin',t:'Quiz J-1 + Fiche + Exercice brevet : carte ou document géo',tag:'e'}
  ]},
  {id:'H7',mat:'hist',sem:'Semaine 5 · 15–21 juin',titre:'H7 — La construction européenne',dates:'Dim 15 juin',jours:[
    {id:'H7-1',d:'Dim 15 juin',t:'Cours + Fiche : étapes, traités, institutions, euro',tag:'f'}
  ]},
  {id:'H8',mat:'hist',sem:'Semaine 5 · 15–21 juin',titre:'H8 — Le monde après 1989',dates:'Lun 16 – Mar 17 juin',jours:[
    {id:'H8-1',d:'Lun 16 juin',t:'Cours : mondialisation, terrorisme, nouveaux conflits',tag:'c'},
    {id:'H8-2',d:'Mar 17 juin',t:'Quiz J-1 + Fiche + Exercice brevet développement construit',tag:'e'}
  ]},
  {id:'H9',mat:'hist',sem:'Semaine 5 · 15–21 juin',titre:'H9 — Refonder la République (1944–1947)',dates:'Mer 18 juin',jours:[
    {id:'H9-1',d:'Mer 18 juin',t:'Cours + Fiche : Libération, droit de vote des femmes, IVe République',tag:'f'}
  ]},
  {id:'H10',mat:'hist',sem:'Semaine 5 · 15–21 juin',titre:'H10 — La Ve République',dates:'Jeu 19 juin',jours:[
    {id:'H10-1',d:'Jeu 19 juin',t:'Cours + Fiche : Constitution 1958, institutions, de Gaulle',tag:'f'}
  ]},
  {id:'H11',mat:'hist',sem:'Semaine 5 · 15–21 juin',titre:'H11 — La société française depuis 1945',dates:'Ven 20 juin',jours:[
    {id:'H11-1',d:'Ven 20 juin',t:'Cours + Fiche : Trente Glorieuses, mai 1968, société de consommation',tag:'f'}
  ]},
  {id:'E1',mat:'emc',sem:'Semaine 6 · 21–25 juin',titre:'Éducation Morale et Civique 1 — Les règles du jeu démocratique',dates:'Sam 21 juin',jours:[
    {id:'E1-1',d:'Sam 21 juin',t:'Cours + Fiche : Constitution, séparation des pouvoirs, laïcité',tag:'f'}
  ]},
  {id:'E2',mat:'emc',sem:'Semaine 6 · 21–25 juin',titre:'Éducation Morale et Civique 2 — Les acteurs de la démocratie',dates:'Dim 22 juin',jours:[
    {id:'E2-1',d:'Dim 22 juin',t:'Cours + Fiche : opinion publique, médias, désinformation, engagement',tag:'f'}
  ]},
  {id:'E3',mat:'emc',sem:'Semaine 6 · 21–25 juin',titre:'Éducation Morale et Civique 3 — Citoyenneté, défense et paix',dates:'Lun 23 juin',jours:[
    {id:'E3-1',d:'Lun 23 juin',t:'Cours + Fiche + Exercice brevet Éducation Morale et Civique durée réelle',tag:'e'}
  ]},
  {id:'R1',mat:'rev',sem:'Semaine 6 · 21–25 juin',titre:'Révision générale — Flash toutes les fiches',dates:'Mar 24 – Mer 25 juin',jours:[
    {id:'R1-1',d:'Mar 24 juin',t:'Révision express Histoire : toutes les fiches, chronologie générale',tag:'v'},
    {id:'R1-2',d:'Mer 25 juin matin',t:'Révision express Géographie : toutes les fiches',tag:'v'},
    {id:'R1-3',d:'Mer 25 juin ap-midi',t:'Révision express Éducation Morale et Civique : toutes les fiches',tag:'v'}
  ]}
];

// ── CONSTANTES ────────────────────────────────────────────────────────────
var TC = {c:'tc',q:'tq',f:'tf',e:'te',v:'tv'};
var TL = {c:'Cours',q:'Quiz',f:'Fiche',e:'Exo brevet',v:'Révision'};
var MC = {hist:'bh',geo:'bg',emc:'be',rev:'br'};
var ML = {hist:'Histoire',geo:'Géographie',emc:'Éducation Morale et Civique',rev:'Révision'};
var FC = {all:'aa',hist:'ah',geo:'ag',emc:'ae',rev:'ar'};

// ── ÉTAT ──────────────────────────────────────────────────────────────────
var done = {};
try { done = JSON.parse(localStorage.getItem('brevet2026') || '{}'); } catch(e) { done = {}; }
var filtreCourant = 'all';

// ── SAUVEGARDE ────────────────────────────────────────────────────────────
function sauver() {
  try { localStorage.setItem('brevet2026', JSON.stringify(done)); } catch(e) {}
}

// ── PROGRESSION ───────────────────────────────────────────────────────────
function majProgression() {
  var tous = [];
  for (var i = 0; i < SEQS.length; i++) {
    for (var j = 0; j < SEQS[i].jours.length; j++) tous.push(SEQS[i].jours[j]);
  }
  var total = tous.length;
  var nb = 0;
  for (var i = 0; i < tous.length; i++) if (done[tous[i].id]) nb++;
  var pct = total ? Math.round(nb / total * 100) : 0;
  document.getElementById('pb').style.width = pct + '%';
  document.getElementById('pb-label').textContent = nb + ' tâche' + (nb > 1 ? 's' : '') + ' accomplie' + (nb > 1 ? 's' : '') + ' sur ' + total + ' (' + pct + ' %)';
  document.getElementById('st-tot').innerHTML = '<b>' + total + '</b> tâches';
  document.getElementById('st-fait').innerHTML = '<b style="color:#1E8449">' + nb + '</b> terminée' + (nb > 1 ? 's' : '');
  document.getElementById('st-rest').innerHTML = '<b style="color:#C0392B">' + (total - nb) + '</b> restante' + ((total - nb) > 1 ? 's' : '');
}

// ── COCHER UNE TÂCHE ──────────────────────────────────────────────────────
function cocher(id) {
  done[id] = !done[id];
  sauver();
  afficher(filtreCourant);
  majProgression();
}

// ── AFFICHAGE ─────────────────────────────────────────────────────────────
function afficher(filtre) {
  filtreCourant = filtre;
  var cont = document.getElementById('main');
  cont.innerHTML = '';
  var seqs = filtre === 'all' ? SEQS : [];
  if (filtre !== 'all') {
    for (var i = 0; i < SEQS.length; i++) {
      if (SEQS[i].mat === filtre) seqs.push(SEQS[i]);
    }
  }
  if (!seqs.length) {
    cont.innerHTML = '<div class="vide">Aucune séquence pour ce filtre.</div>';
    return;
  }
  // Regrouper par semaine
  var sems = [];
  var semMap = {};
  for (var i = 0; i < seqs.length; i++) {
    var s = seqs[i].sem || 'Autre';
    if (!semMap[s]) { semMap[s] = []; sems.push(s); }
    semMap[s].push(seqs[i]);
  }
  for (var si = 0; si < sems.length; si++) {
    var sem = sems[si];
    var wseqs = semMap[sem];
    var wh = document.createElement('div');
    wh.className = 'wk-head';
    wh.innerHTML = '<span class="wk-badge">📅 ' + sem + '</span>';
    cont.appendChild(wh);
    for (var qi = 0; qi < wseqs.length; qi++) {
      var seq = wseqs[qi];
      var total = seq.jours.length;
      var nb = 0;
      for (var ji = 0; ji < seq.jours.length; ji++) if (done[seq.jours[ji].id]) nb++;
      var pct = total ? Math.round(nb / total * 100) : 0;
      var col = pct === 100 ? '#1E8449' : pct > 0 ? '#D35400' : '#7F8C8D';
      // Construire les jours
      var jh = '';
      for (var ji = 0; ji < seq.jours.length; ji++) {
        var j = seq.jours[ji];
        var estFait = done[j.id] ? ' fait' : '';
        jh += '<div class="jour' + estFait + '" onclick="cocher(\'' + j.id + '\')">' +
          '<div class="case"><span class="coche">&#10003;</span></div>' +
          '<div class="jour-info">' +
          '<div class="jour-date">' + j.d + '</div>' +
          '<div class="jour-tache">' + j.t + '</div>' +
          '</div>' +
          '<span class="tag ' + TC[j.tag] + '">' + TL[j.tag] + '</span>' +
          '</div>';
      }
      var bloc = document.createElement('div');
      bloc.className = 'seq';
      bloc.innerHTML =
        '<div class="seq-hd" onclick="basculer(this)">' +
        '<span class="mat ' + MC[seq.mat] + '">' + ML[seq.mat] + '</span>' +
        '<div class="seq-info">' +
        '<div class="seq-titre">' + seq.titre + '</div>' +
        '<div class="seq-dates">' + seq.dates + '</div>' +
        '</div>' +
        '<span class="seq-nb" style="color:' + col + '">' + nb + '/' + total + '</span>' +
        '<span class="seq-fl">&#9660;</span>' +
        '</div>' +
        '<div class="seq-bd">' + jh + '</div>';
      cont.appendChild(bloc);
    }
  }
}

// ── OUVRIR / FERMER UNE SÉQUENCE ─────────────────────────────────────────
function basculer(tete) {
  var corps = tete.nextElementSibling;
  var fleche = tete.querySelector('.seq-fl');
  if (corps.className.indexOf('ouvert') >= 0) {
    corps.className = 'seq-bd';
    fleche.className = 'seq-fl';
  } else {
    corps.className = 'seq-bd ouvert';
    fleche.className = 'seq-fl ouvert';
  }
}

// ── FILTRER ───────────────────────────────────────────────────────────────
function filtrer(mat) {
  var ids = ['all','hist','geo','emc','rev'];
  for (var i = 0; i < ids.length; i++) {
    var btn = document.getElementById('fb-' + ids[i]);
    if (btn) btn.className = 'fb' + (ids[i] === mat ? ' ' + FC[mat] : '');
  }
  afficher(mat);
}

// ── REMISE À ZÉRO ─────────────────────────────────────────────────────────
function razAll() {
  if (window.confirm('Remettre toutes les cases à zéro ?')) {
    done = {};
    sauver();
    afficher(filtreCourant);
    majProgression();
  }
}

// ── INITIALISATION ────────────────────────────────────────────────────────
afficher('all');
majProgression();
</script>
