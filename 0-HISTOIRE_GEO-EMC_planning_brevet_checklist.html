<style>
:root{
  --rouge:#C0392B;--rouge-clair:#FADBD8;
  --bleu:#1A5276;--bleu-clair:#D6EAF8;
  --vert:#1E8449;--vert-clair:#D5F5E3;
  --orange:#D35400;--orange-clair:#FDEBD0;
  --violet:#6C3483;--violet-clair:#E8DAEF;
  --gris:#5D6D7E;--gris-clair:#EAF2FF;
  --fond:#F8F9FA;--blanc:#FFFFFF;
  --texte:#2C3E50;--attenue:#7F8C8D;
  --bord:#DEE2E6;
}
*{-webkit-box-sizing:border-box;box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:var(--fond);color:var(--texte);font-size:15px;-webkit-font-smoothing:antialiased}
.top-bar{background:var(--bleu);color:white;padding:16px 14px 12px}
.top-bar h1{font-size:16px;font-weight:700;margin-bottom:2px}
.top-bar p{font-size:11px;opacity:.88;margin-bottom:10px}
.pb-wrap{background:rgba(255,255,255,.25);border-radius:20px;height:8px}
.pb-fill{background:#2ECC71;border-radius:20px;height:8px;-webkit-transition:width .4s;transition:width .4s}
.pb-label{font-size:11px;opacity:.9;margin-top:4px}
.legende{display:-webkit-flex;display:flex;-webkit-flex-wrap:wrap;flex-wrap:wrap;gap:8px;padding:8px 14px;background:var(--blanc);border-bottom:1px solid var(--bord)}
.leg{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:5px;font-size:11px;color:var(--attenue)}
.leg-pt{width:9px;height:9px;border-radius:2px;-webkit-flex-shrink:0;flex-shrink:0}
.filtres{display:-webkit-flex;display:flex;gap:8px;-webkit-flex-wrap:wrap;flex-wrap:wrap;padding:10px 14px;background:var(--blanc);border-bottom:1px solid var(--bord)}
.fb{border:1.5px solid var(--bord);border-radius:20px;padding:6px 13px;font-size:12px;font-weight:600;cursor:pointer;background:var(--blanc);color:var(--attenue);-webkit-appearance:none;appearance:none;font-family:inherit}
.fb.aa{background:var(--texte);color:white;border-color:var(--texte)}
.fb.ah{background:var(--rouge-clair);color:var(--rouge);border-color:var(--rouge)}
.fb.ag{background:var(--bleu-clair);color:var(--bleu);border-color:var(--bleu)}
.fb.ae{background:var(--vert-clair);color:var(--vert);border-color:var(--vert)}
.fb.af{background:var(--violet-clair);color:var(--violet);border-color:var(--violet)}
.fb.ar{background:var(--gris-clair);color:var(--gris);border-color:var(--gris)}
.fb.apc{background:#D6EAF8;color:#2471A3;border-color:#2471A3}
.fb.asvt{background:#A9DFBF;color:#117A65;border-color:#117A65}
.mat.bpc{background:#2471A3;color:white}
.mat.bsvt{background:#117A65;color:white}
.stats{display:-webkit-flex;display:flex;gap:10px;padding:8px 14px;background:var(--blanc);border-bottom:1px solid var(--bord);-webkit-flex-wrap:wrap;flex-wrap:wrap;-webkit-align-items:center;align-items:center}
.stat{font-size:12px;color:var(--attenue)}
.stat b{color:var(--texte)}
.raz{font-size:11px;color:var(--rouge);border:none;background:none;cursor:pointer;margin-left:auto;text-decoration:underline;padding:4px 0;-webkit-appearance:none;font-family:inherit}
.main{padding:12px 14px;max-width:680px;margin:0 auto}
.wk-head{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:8px;margin:18px 0 8px;padding-bottom:6px;border-bottom:2px solid var(--bord)}
.wk-badge{background:var(--texte);color:white;border-radius:20px;padding:3px 12px;font-size:11px;font-weight:700;-webkit-flex-shrink:0;flex-shrink:0}
.seq{background:var(--blanc);border:1px solid var(--bord);border-radius:10px;margin-bottom:10px;overflow:hidden}
.seq-hd{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:8px;padding:12px 13px;cursor:pointer;-webkit-tap-highlight-color:rgba(0,0,0,.05);-webkit-user-select:none;user-select:none}
.mat{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;-webkit-flex-shrink:0;flex-shrink:0}
.bh{background:var(--rouge-clair);color:var(--rouge)}
.bg{background:var(--bleu-clair);color:var(--bleu)}
.be{background:var(--vert-clair);color:var(--vert)}
.bf{background:var(--violet-clair);color:var(--violet)}
.br{background:var(--gris-clair);color:var(--gris)}
.seq-info{-webkit-flex:1;flex:1;min-width:0;overflow:hidden}
.seq-titre{font-size:13px;font-weight:600;color:var(--texte);line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.seq-dates{font-size:11px;color:var(--attenue);margin-top:2px}
.seq-nb{font-size:11px;font-weight:700;-webkit-flex-shrink:0;flex-shrink:0;margin-left:4px}
.seq-fl{font-size:12px;color:var(--attenue);margin-left:4px;-webkit-flex-shrink:0;flex-shrink:0;display:inline-block;-webkit-transition:-webkit-transform .2s;transition:transform .2s}
.seq-fl.ouvert{-webkit-transform:rotate(180deg);transform:rotate(180deg)}
.seq-bd{display:none;border-top:1px solid var(--bord)}
.seq-bd.ouvert{display:block}
.jour{display:-webkit-flex;display:flex;-webkit-align-items:flex-start;align-items:flex-start;gap:10px;padding:10px 13px;border-bottom:1px solid #F0F0F0;cursor:pointer;-webkit-tap-highlight-color:rgba(0,0,0,.05)}
.jour:last-child{border-bottom:none}
.jour.fait{background:#F0FFF4}
.case{width:22px;height:22px;min-width:22px;border:2px solid var(--bord);border-radius:5px;-webkit-flex-shrink:0;flex-shrink:0;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;margin-top:1px}
.jour.fait .case{background:var(--vert);border-color:var(--vert)}
.coche{color:white;font-size:13px;font-weight:700;display:none}
.jour.fait .coche{display:block}
.jour-info{-webkit-flex:1;flex:1;min-width:0}
.jour-date{font-size:11px;color:var(--attenue);font-weight:600;margin-bottom:2px}
.jour-tache{font-size:13px;color:var(--texte);line-height:1.4}
.jour.fait .jour-tache{text-decoration:line-through;color:var(--attenue)}
.tag{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap;-webkit-flex-shrink:0;flex-shrink:0;-webkit-align-self:flex-start;align-self:flex-start;margin-top:2px}
.tc{background:#D6EAF8;color:#1A5276}
.tq{background:#D5F5E3;color:#1E8449}
.tf{background:#FDEBD0;color:#D35400}
.te{background:#FADBD8;color:#C0392B}
.tv{background:#EAF2FF;color:#5D6D7E}
.vide{text-align:center;color:var(--attenue);padding:40px 20px;font-size:14px}
@media(max-width:380px){.seq-titre{font-size:12px}.jour-tache{font-size:12px}.filtres{gap:6px}.fb{padding:5px 10px;font-size:11px}}

var TC = {c:'tc',q:'tq',f:'tf',e:'te',v:'tv'};
var TL = {c:'Cours',q:'Quiz',f:'Fiche',e:'Exercice',v:'Révision'};
var MC = {hist:'bh',geo:'bg',emc:'be',fran:'bf',rev:'br',pc:'bpc',svt:'bsvt'};
var ML = {hist:'Histoire',geo:'Géographie',emc:'Éducation Morale et Civique',fran:'Français',rev:'Révision',pc:'Physique-Chimie',svt:'SVT'};
var FC = {all:'aa',hist:'ah',geo:'ag',emc:'ae',fran:'af',rev:'ar',pc:'apc',svt:'asvt'};

var done = {};
try { done = JSON.parse(localStorage.getItem('brevet2026') || '{}'); } catch(e) { done = {}; }
var filtreCourant = 'all';

function sauver() {
  try { localStorage.setItem('brevet2026', JSON.stringify(done)); } catch(e) {}
}

function majProgression() {
  var tous = [];
  for (var i = 0; i < SEQS.length; i++) {
    for (var j = 0; j < SEQS[i].jours.length; j++) tous.push(SEQS[i].jours[j]);
  }
  var total = tous.length;
  var nb = 0;
  for (var i = 0; i < tous.length; i++) if (done[tous[i].id]) nb++;
  var pct = total ? Math.round(nb / total * 100) : 0;
  document.getElementById('pb').style.width = pct + '%';
  document.getElementById('pb-label').textContent = nb + ' tâche' + (nb > 1 ? 's' : '') + ' accomplie' + (nb > 1 ? 's' : '') + ' sur ' + total + ' (' + pct + ' %)';
  document.getElementById('st-tot').innerHTML = '<b>' + total + '</b> tâches';
  document.getElementById('st-fait').innerHTML = '<b style="color:#1E8449">' + nb + '</b> terminée' + (nb > 1 ? 's' : '');
  document.getElementById('st-rest').innerHTML = '<b style="color:#C0392B">' + (total - nb) + '</b> restante' + ((total - nb) > 1 ? 's' : '');
}

function cocher(id) {
  done[id] = !done[id];
  sauver();
  afficher(filtreCourant);
  majProgression();
}

function afficher(filtre) {
  filtreCourant = filtre;
  var cont = document.getElementById('main');
  cont.innerHTML = '';
  var seqs = [];
  if (filtre === 'all') {
    seqs = SEQS;
  } else {
    for (var i = 0; i < SEQS.length; i++) {
      if (SEQS[i].mat === filtre) seqs.push(SEQS[i]);
    }
  }
  if (!seqs.length) {
    cont.innerHTML = '<div class="vide">Aucune séquence pour ce filtre.</div>';
    return;
  }
  var sems = [];
  var semMap = {};
  for (var i = 0; i < seqs.length; i++) {
    var s = seqs[i].sem || 'Autre';
    if (!semMap[s]) { semMap[s] = []; sems.push(s); }
    semMap[s].push(seqs[i]);
  }
  for (var si = 0; si < sems.length; si++) {
    var sem = sems[si];
    var wseqs = semMap[sem];
    var wh = document.createElement('div');
    wh.className = 'wk-head';
    wh.innerHTML = '<span class="wk-badge">📅 ' + sem + '</span>';
    cont.appendChild(wh);
    for (var qi = 0; qi < wseqs.length; qi++) {
      var seq = wseqs[qi];
      var total = seq.jours.length;
      var nb = 0;
      for (var ji = 0; ji < seq.jours.length; ji++) if (done[seq.jours[ji].id]) nb++;
      var pct = total ? Math.round(nb / total * 100) : 0;
      var col = pct === 100 ? '#1E8449' : pct > 0 ? '#D35400' : '#7F8C8D';
      var jh = '';
      for (var ji = 0; ji < seq.jours.length; ji++) {
        var j = seq.jours[ji];
        var estFait = done[j.id] ? ' fait' : '';
        jh += '<div class="jour' + estFait + '" onclick="cocher(\'' + j.id + '\')">' +
          '<div class="case"><span class="coche">&#10003;</span></div>' +
          '<div class="jour-info">' +
          '<div class="jour-date">' + j.d + '</div>' +
          '<div class="jour-tache">' + j.t + '</div>' +
          '</div>' +
          '<span class="tag ' + TC[j.tag] + '">' + TL[j.tag] + '</span>' +
          '</div>';
      }
      var bloc = document.createElement('div');
      bloc.className = 'seq';
      bloc.innerHTML =
        '<div class="seq-hd" onclick="basculer(this)">' +
        '<span class="mat ' + MC[seq.mat] + '">' + ML[seq.mat] + '</span>' +
        '<div class="seq-info">' +
        '<div class="seq-titre">' + seq.titre + '</div>' +
        '<div class="seq-dates">' + seq.dates + '</div>' +
        '</div>' +
        '<span class="seq-nb" style="color:' + col + '">' + nb + '/' + total + '</span>' +
        '<span class="seq-fl">&#9660;</span>' +
        '</div>' +
        '<div class="seq-bd">' + jh + '</div>';
      cont.appendChild(bloc);
    }
  }
}

function basculer(tete) {
  var corps = tete.nextElementSibling;
  var fleche = tete.querySelector('.seq-fl');
  if (corps.className.indexOf('ouvert') >= 0) {
    corps.className = 'seq-bd';
    fleche.className = 'seq-fl';
  } else {
    corps.className = 'seq-bd ouvert';
    fleche.className = 'seq-fl ouvert';
  }
}

function filtrer(mat) {
  var ids = ['all','hist','geo','emc','fran','rev','pc','svt'];
  for (var i = 0; i < ids.length; i++) {
    var btn = document.getElementById('fb-' + ids[i]);
    if (btn) btn.className = 'fb' + (ids[i] === mat ? ' ' + FC[mat] : '');
  }
  afficher(mat);
}

function razAll() {
  if (window.confirm('Remettre toutes les cases à zéro ?')) {
    done = {};
    sauver();
    afficher(filtreCourant);
    majProgression();
  }
}

afficher('all');
majProgression();
